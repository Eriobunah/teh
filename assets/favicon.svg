<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <circle cx="16" cy="16" r="16" fill="#080E19"/>
  <circle cx="16" cy="16" r="12.5" fill="none" stroke="#C8832A" stroke-width="0.6" opacity="0.35"/>
  <!-- Hour markers -->
  <line x1="16" y1="4.5" x2="16" y2="7" stroke="#C8832A" stroke-width="0.8" opacity="0.5"/>
  <line x1="27.5" y1="16" x2="25" y2="16" stroke="#C8832A" stroke-width="0.8" opacity="0.5"/>
  <line x1="16" y1="27.5" x2="16" y2="25" stroke="#C8832A" stroke-width="0.8" opacity="0.5"/>
  <line x1="4.5" y1="16" x2="7" y2="16" stroke="#C8832A" stroke-width="0.8" opacity="0.5"/>
  <!-- Hour hand → 11 o'clock (upper left) -->
  <line x1="16" y1="16" x2="9.2" y2="8.8" stroke="#C8832A" stroke-width="2" stroke-linecap="round"/>
  <!-- Minute hand → 12 o'clock -->
  <line x1="16" y1="16" x2="16" y2="5.5" stroke="#F0EBE0" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
  <!-- Center -->
  <circle cx="16" cy="16" r="1.6" fill="#C8832A"/>
</svg>
